{% extends 'base.html' %}

{% block title %}Login — RoomChat{% endblock %}

{% block content %}
<div class="auth-container" id="login-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
            </div>
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Sign in to continue to RoomChat</p>
        </div>

        <form method="post" class="auth-form" id="login-form">
            {% csrf_token %}

            {% if messages %}
                {% for message in messages %}
                <div class="form-error">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <div class="form-group">
                <label for="id_username" class="form-label">Username</label>
                <input type="text" name="username" id="id_username" class="form-input" placeholder="Enter your username" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label for="id_password" class="form-label">Password</label>
                <input type="password" name="password" id="id_password" class="form-input" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="login-submit">
                Sign In
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{% url 'register' %}" class="auth-link" id="register-link">Create one</a></p>
        </div>
    </div>
</div>
{% endblock %}
